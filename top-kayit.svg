  <polygon points="100,38 115,52 110,70 90,70 85,52" fill="#1a1a1a" stroke="#111" stroke-width="1.5"/>
  <polygon points="155,72 162,90 148,102 134,94 136,76" fill="#1a1a1a" stroke="#111" stroke-width="1.5"/>
  <polygon points="140,148 126,156 112,146 116,128 134,126" fill="#1a1a1a" stroke="#111" stroke-width="1.5"/>
  <polygon points="60,148 66,128 84,126 88,146 74,156" fill="#1a1a1a" stroke="#111" stroke-width="1.5"/>
  <polygon points="45,72 64,76 66,94 52,102 38,90" fill="#1a1a1a" stroke="#111" stroke-width="1.5"/>
  <!-- Beyaz yüzey çizgileri -->
  <line x1="100" y1="38" x2="115" y2="52" stroke="#ddd" stroke-width="1"/>
  <line x1="100" y1="38" x2="85" y2="52" stroke="#ddd" stroke-width="1"/>
