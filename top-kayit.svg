<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Hareket çizgileri -->
  <line x1="20" y1="60" x2="5" y2="55" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="72" x2="2" y2="72" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="84" x2="5" y2="89" stroke="#555" stroke-width="2" stroke-linecap="round"/>
