  <!-- Parlama -->
  <ellipse cx="78" cy="68" rx="14" ry="9" fill="rgba(255,255,255,0.55)" transform="rotate(-30,78,68)"/>
  <!-- KAYIT OL yazısı - gölge -->
  <text x="102" y="108" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="22" fill="#333" letter-spacing="1">KAYIT OL</text>
  <!-- KAYIT OL yazısı - ana -->
  <text x="100" y="106" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="22" fill="white" stroke="#222" stroke-width="3" paint-order="stroke" letter-spacing="1">KAYIT OL</text>
